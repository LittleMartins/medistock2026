<div class="min-h-screen flex items-center justify-center bg-[#F8FAFC] dark:bg-slate-950 py-20 px-4 sm:px-6 lg:px-8 transition-colors duration-500 relative overflow-hidden">
  
  <!-- Background Decorations -->
  <div class="absolute top-0 left-0 w-full h-full pointer-events-none z-0">
    <div class="absolute -top-[10%] -left-[10%] w-[40%] h-[40%] bg-primary-100/40 dark:bg-primary-900/10 rounded-full blur-[100px]"></div>
    <div class="absolute -bottom-[10%] -right-[10%] w-[40%] h-[40%] bg-medical-blue/5 dark:bg-medical-blue/10 rounded-full blur-[100px]"></div>
  </div>

  <div class="max-w-md w-full relative z-10">
    <div class="text-center mb-10">
      <a routerLink="/" class="inline-flex items-center space-x-3 mb-8 group">
        <div class="h-12 w-12 rounded-2xl bg-gradient-to-br from-primary-600 to-medical-blue text-white flex items-center justify-center shadow-lg shadow-primary-500/20 group-hover:scale-105 transition-transform">
          <lucide-icon [name]="ActivityIcon" class="h-6 w-6"></lucide-icon>
        </div>
        <span class="text-2xl font-black text-slate-900 dark:text-white tracking-tighter">
          MEDI<span class="text-primary-600">STOCK</span>
        </span>
      </a>
      <h2 class="text-4xl font-black text-slate-900 dark:text-white tracking-tighter">Bienvenido de nuevo</h2>
      <p class="mt-3 text-slate-500 dark:text-slate-400 font-medium">
        ¿Aún no eres parte? 
        <a routerLink="/register" class="text-primary-600 font-bold hover:text-primary-700 transition-colors">Crea tu cuenta profesional</a>
      </p>
    </div>

    <div class="card p-8 sm:p-10 border-slate-200/50 dark:border-slate-800/50 shadow-2xl">
      <!-- Error Alert -->
      <div *ngIf="errorMessage" class="mb-6 p-4 rounded-2xl bg-red-50 dark:bg-red-900/20 border border-red-100 dark:border-red-900/30 flex items-center gap-3 animate-shake">
        <lucide-icon [name]="XCircleIcon" class="h-5 w-5 text-red-600"></lucide-icon>
        <p class="text-sm font-bold text-red-700 dark:text-red-400">{{ errorMessage }}</p>
      </div>

      <!-- Form -->
      <form class="space-y-6" (ngSubmit)="onSubmit()">
        <div class="space-y-5">
          <div class="group">
            <label for="email-address" class="block text-xs font-black text-slate-400 dark:text-slate-500 uppercase tracking-widest mb-2 px-1">Correo Electrónico</label>
            <div class="relative">
              <div class="absolute inset-y-0 left-0 pl-5 flex items-center pointer-events-none">
                <lucide-icon [name]="MailIcon" class="h-5 w-5 text-slate-300 group-focus-within:text-primary-500 transition-colors"></lucide-icon>
              </div>
              <input 
                id="email-address" 
                name="email" 
                type="email" 
                required 
                [(ngModel)]="email"
                class="w-full bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 rounded-2xl py-4 pl-12 pr-4 text-sm focus:ring-4 focus:ring-primary-500/5 focus:border-primary-500/30 outline-none transition-all dark:text-white font-medium" 
                placeholder="ejemplo@clinica.cl"
              >
            </div>
          </div>

          <div class="group">
            <div class="flex items-center justify-between mb-2 px-1">
              <label for="password" class="block text-xs font-black text-slate-400 dark:text-slate-500 uppercase tracking-widest">Contraseña</label>
              <a routerLink="/forgot-password" class="text-[10px] font-black text-primary-600 uppercase tracking-widest hover:text-primary-700">¿Olvidaste tu clave?</a>
            </div>
            <div class="relative">
              <div class="absolute inset-y-0 left-0 pl-5 flex items-center pointer-events-none">
                <lucide-icon [name]="LockIcon" class="h-5 w-5 text-slate-300 group-focus-within:text-primary-500 transition-colors"></lucide-icon>
              </div>
              <input 
                id="password" 
                name="password" 
                [type]="showPassword ? 'text' : 'password'" 
                required 
                [(ngModel)]="password"
                class="w-full bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 rounded-2xl py-4 pl-12 pr-12 text-sm focus:ring-4 focus:ring-primary-500/5 focus:border-primary-500/30 outline-none transition-all dark:text-white font-medium" 
                placeholder="••••••••••••"
              >
              <button 
                type="button"
                (click)="togglePassword()"
                class="absolute inset-y-0 right-0 pr-5 flex items-center text-slate-300 hover:text-primary-500 transition-colors focus:outline-none"
              >
                <lucide-icon [name]="showPassword ? EyeOffIcon : EyeIcon" class="h-5 w-5"></lucide-icon>
              </button>
            </div>
          </div>
        </div>

        <div class="flex items-center px-1">
          <input id="remember-me" name="remember-me" type="checkbox" class="h-5 w-5 text-primary-600 focus:ring-primary-500 border-slate-200 dark:border-slate-800 rounded-lg bg-slate-50 dark:bg-slate-950 cursor-pointer transition-all">
          <label for="remember-me" class="ml-3 block text-sm text-slate-500 dark:text-slate-400 font-bold cursor-pointer hover:text-slate-900 dark:hover:text-slate-200 transition-colors">
            Mantener sesión activa
          </label>
        </div>

        <button 
          type="submit" 
          [disabled]="isLoading || !email || !password"
          class="btn-primary w-full py-4 text-lg shadow-2xl shadow-primary-600/20 relative overflow-hidden group"
        >
          <span *ngIf="!isLoading" class="flex items-center justify-center gap-3">
            Acceder al Sistema
            <lucide-icon [name]="LogInIcon" class="h-5 w-5 group-hover:translate-x-1 transition-transform"></lucide-icon>
          </span>
          <div *ngIf="isLoading" class="flex items-center justify-center">
            <div class="h-6 w-6 border-4 border-white/30 border-t-white rounded-full animate-spin"></div>
          </div>
        </button>
      </form>
    </div>
    
    <p class="mt-10 text-center text-xs text-slate-400 dark:text-slate-500 font-bold uppercase tracking-widest">
      &copy; 2026 MEDISTOCK SOLUTIONS. <br> ACCESO RESTRINGIDO A PERSONAL AUTORIZADO.
    </p>
  </div>
</div>
