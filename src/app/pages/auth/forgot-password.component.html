<div class="min-h-[80vh] flex items-center justify-center bg-slate-50 dark:bg-slate-950 py-12 px-4 sm:px-6 lg:px-8 transition-colors duration-300">
  <div class="max-w-md w-full space-y-8 card p-8 sm:p-10">
    
    <!-- Header -->
    <div class="text-center">
      <div class="mx-auto flex items-center justify-center h-16 w-16 rounded-full bg-primary-100 dark:bg-primary-900/30 text-primary-600 mb-4">
        <lucide-icon [name]="KeyRoundIcon" class="h-8 w-8"></lucide-icon>
      </div>
      <h2 class="text-center text-3xl font-extrabold text-slate-900 dark:text-white">
        Restablecer Contraseña
      </h2>
      <p class="mt-2 text-center text-sm text-slate-600 dark:text-slate-400">
        Ingresa tu correo y te enviaremos las instrucciones
      </p>
    </div>

    <!-- Error Alert -->
    <div *ngIf="errorMessage" class="bg-red-50 dark:bg-red-900/30 border-l-4 border-red-500 p-4 rounded-md">
      <div class="flex">
        <div class="flex-shrink-0">
          <svg class="h-5 w-5 text-red-400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd" />
          </svg>
        </div>
        <div class="ml-3">
          <p class="text-sm text-red-700 dark:text-red-400">
            {{ errorMessage }}
          </p>
        </div>
      </div>
    </div>

    <!-- Success Alert -->
    <div *ngIf="successMessage" class="bg-green-50 dark:bg-green-900/30 border-l-4 border-green-500 p-4 rounded-md">
      <div class="flex">
        <div class="flex-shrink-0">
          <svg class="h-5 w-5 text-green-400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd" />
          </svg>
        </div>
        <div class="ml-3">
          <p class="text-sm text-green-700 dark:text-green-400">
            {{ successMessage }}
          </p>
        </div>
      </div>
    </div>

    <!-- Form -->
    <form *ngIf="!successMessage" class="mt-8 space-y-6" (ngSubmit)="onSubmit()">
      <div class="space-y-4 rounded-md shadow-sm">
        <div>
          <label for="email-address" class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Correo Electrónico</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <lucide-icon [name]="MailIcon" class="h-5 w-5 text-slate-400"></lucide-icon>
            </div>
            <input 
              id="email-address" 
              name="email" 
              type="email" 
              autocomplete="email" 
              required 
              [(ngModel)]="email"
              class="input-field pl-10" 
              placeholder="tu@email.com"
            >
          </div>
        </div>
      </div>

      <div>
        <button 
          type="submit" 
          [disabled]="isLoading || !email"
          class="group relative w-full flex justify-center py-3 px-4 border border-transparent text-sm font-medium rounded-md text-white bg-primary-600 hover:bg-primary-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary-500 transition-colors disabled:opacity-70 disabled:cursor-not-allowed"
        >
          <span *ngIf="isLoading" class="absolute left-0 inset-y-0 flex items-center pl-3">
            <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
          </span>
          {{ isLoading ? 'Enviando...' : 'Enviar correo de recuperación' }}
        </button>
      </div>
    </form>
    
    <div class="mt-6 text-center">
      <a routerLink="/login" class="inline-flex items-center text-sm font-medium text-slate-600 hover:text-primary-600 dark:text-slate-400 dark:hover:text-primary-400 transition-colors">
        <lucide-icon [name]="ArrowLeftIcon" class="h-4 w-4 mr-2"></lucide-icon>
        Volver al inicio de sesión
      </a>
    </div>
  </div>
</div>
